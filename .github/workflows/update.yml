name: Build & Publish Flatpak

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: flatpak-deploy
  cancel-in-progress: false

jobs:
  check:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      url: ${{ steps.meta.outputs.url }}
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5

      - name: Fetch Kiro metadata
        id: meta
        run: |
          METADATA_URL="https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json"
          METADATA=$(curl -fsSL "$METADATA_URL")

          VERSION=$(echo "$METADATA" | jq -r '.currentRelease')
          URL=$(echo "$METADATA" | jq -r '.releases[].updateTo.url' | grep '\.tar\.gz' | head -1)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Kiro version: $VERSION"

      - name: Compare with last built version
        id: compare
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          NEW_VERSION="${{ steps.meta.outputs.version }}"

          # Tags now include git hash (e.g. v0.11.63.abc1234)
          # Extract base Kiro version from latest tag for comparison
          LATEST_BASE=$(echo "$LATEST_TAG" | sed 's/^v//; s/+[a-f0-9]\{7\}$//')

          if [ "$LATEST_BASE" = "$NEW_VERSION" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Version $NEW_VERSION already built ($LATEST_TAG), skipping."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: $NEW_VERSION (last tag: $LATEST_TAG)"
          fi

  build:
    name: Build Flatpak
    needs: check
    if: needs.check.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - uses: actions/checkout@v5

      - name: Download and compute SHA256
        id: download
        run: |
          URL="${{ needs.check.outputs.url }}"
          VERSION="${{ needs.check.outputs.version }}"
          TARBALL="/tmp/kiro-${VERSION}.tar.gz"

          curl -L --progress-bar -o "$TARBALL" "$URL"
          SHA256=$(sha256sum "$TARBALL" | awk '{print $1}')

          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Generate manifest
        run: |
          git config --global --add safe.directory "$PWD"
          GIT_SHORT_HASH=$(git rev-parse --short HEAD)
          KIRO_RELEASE="${{ needs.check.outputs.version }}+${GIT_SHORT_HASH}"
          KIRO_DATE=$(date +%Y-%m-%d)
          echo "KIRO_RELEASE=${KIRO_RELEASE}" >> "$GITHUB_ENV"

          sed \
            -e "s|KIRO_URL_PLACEHOLDER|${{ needs.check.outputs.url }}|g" \
            -e "s|KIRO_SHA256_PLACEHOLDER|${{ steps.download.outputs.sha256 }}|g" \
            -e "s|KIRO_VERSION_PLACEHOLDER|${{ needs.check.outputs.version }}|g" \
            -e "s|KIRO_DATE_PLACEHOLDER|${KIRO_DATE}|g" \
            kiro.desktop.unofficial.yml > kiro.desktop.unofficial.generated.yml

          sed \
            -e "s|KIRO_VERSION_PLACEHOLDER|${{ needs.check.outputs.version }}|g" \
            -e "s|KIRO_DATE_PLACEHOLDER|${KIRO_DATE}|g" \
            kiro.desktop.unofficial.metainfo.xml > kiro.desktop.unofficial.metainfo.generated.xml

          cat kiro.desktop.unofficial.generated.yml

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: kiro.desktop.unofficial.generated.yml
          bundle: kiro.desktop.unofficial.flatpak
          upload-artifact: false
          cache-key: flatpak-builder-${{ needs.check.outputs.version }}
          gpg-sign: ${{ env.GPG_KEY_ID }}

      - name: Fix repo for static hosting
        run: |
          rm -f repo/summary.idx
          ls -la repo/summary repo/config

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: kiro-flatpak-${{ needs.check.outputs.version }}
          path: kiro.desktop.unofficial.flatpak
          retention-days: 90

      - name: Export GPG public key to repo
        run: |
          gpg --export "${{ env.GPG_KEY_ID }}" > repo/kiro-unofficial.gpg

      - name: Prepare Pages content
        run: |
          # Copy documentation to Pages
          mkdir -p repo/docs
          cp docs/*.md repo/docs/
          
          cat > repo/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Kiro Flatpak Repo</title></head>
          <body>
          <h1>Kiro IDE — Unofficial Flatpak Repository</h1>
          <pre>
          # Ensure Flathub is available (required for runtime dependencies)
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo

          # Download the GPG key and add the repo
          curl -fsSL https://orknist.github.io/kiro-desktop-flatpak/kiro-unofficial.gpg -o /tmp/kiro-unofficial.gpg
          flatpak remote-add --user \
            --gpg-import=/tmp/kiro-unofficial.gpg kiro-unofficial \
            https://orknist.github.io/kiro-desktop-flatpak
          rm /tmp/kiro-unofficial.gpg

          # Install
          flatpak install --user kiro-unofficial kiro.desktop.unofficial

          # Update
          flatpak update --user kiro.desktop.unofficial
          </pre>
          <h2>Documentation</h2>
          <ul>
          <li><a href="docs/podman-setup.md">Podman Setup Guide</a></li>
          <li><a href="docs/docker-setup.md">Docker Setup Guide</a></li>
          </ul>
          <p><a href="https://github.com/orknist/kiro-desktop-flatpak">View on GitHub</a></p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: repo

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release version
        run: |
          GIT_SHORT_HASH=$(git rev-parse --short HEAD)
          KIRO_RELEASE="${{ needs.check.outputs.version }}+${GIT_SHORT_HASH}"
          echo "KIRO_RELEASE=${KIRO_RELEASE}" >> "$GITHUB_ENV"

      - name: Download bundle
        uses: actions/download-artifact@v6
        with:
          name: kiro-flatpak-${{ needs.check.outputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.KIRO_RELEASE }}
          name: Kiro ${{ env.KIRO_RELEASE }}
          body: |
            Automated Flatpak build for Kiro IDE v${{ needs.check.outputs.version }} (build: ${{ env.KIRO_RELEASE }})

            **Prerequisites — ensure Flathub is available (needed for runtime dependencies):**
            ```bash
            flatpak remote-add --if-not-exists --user flathub \
              https://flathub.org/repo/flathub.flatpakrepo
            ```

            **Install via Flatpak repo (recommended):**
            ```bash
            curl -fsSL https://orknist.github.io/kiro-desktop-flatpak/kiro-unofficial.gpg -o /tmp/kiro-unofficial.gpg
            flatpak remote-add --user \
              --gpg-import=/tmp/kiro-unofficial.gpg kiro-unofficial \
              https://orknist.github.io/kiro-desktop-flatpak
            rm /tmp/kiro-unofficial.gpg
            flatpak install --user kiro-unofficial kiro.desktop.unofficial
            ```

            **Or install the bundle directly:**
            ```bash
            flatpak install --user kiro.desktop.unofficial.flatpak
            ```
          files: kiro.desktop.unofficial.flatpak
          generate_release_notes: false
